<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ISO 16269-6 宣称值与规格验证</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="kicker">ISO 16269-6</p>
          <h1>产品宣称值与规格验证</h1>
        </div>
        <div class="top-actions">
          <span>p <strong id="heroP">95%</strong></span>
          <span>Confidence <strong id="heroConf">95%</strong></span>
        </div>
      </header>

      <section class="layout">
        <form id="validationForm" class="panel controls">
          <div class="panel-title">
            <h2>输入</h2>
            <button class="subtle-button" type="button" id="loadExample">示例</button>
          </div>

          <label>
            产品特性
            <input name="title_label" value="关键结构件尺寸" placeholder="关键结构件尺寸" />
          </label>

          <label>
            样本数据
            <textarea name="samples" rows="8" spellcheck="false">50.1, 48.9, 51.2, 49.5, 50.6, 52.1, 48.5, 50.0, 49.8, 51.0,
50.5, 49.2, 51.8, 50.1, 49.9, 51.1, 48.8, 50.3, 49.6, 50.8</textarea>
          </label>

          <div class="segmented" role="radiogroup" aria-label="验证类型">
            <label><input type="radio" name="scenario" value="two-sided" checked /> 双侧</label>
            <label><input type="radio" name="scenario" value="lower" /> 下限</label>
            <label><input type="radio" name="scenario" value="upper" /> 上限</label>
          </div>

          <div class="field-grid">
            <label>
              覆盖率 p
              <input name="p_target" type="number" min="0.5" max="0.999" step="0.001" value="0.95" />
            </label>
            <label>
              置信度
              <input name="conf_target" type="number" min="0.5" max="0.999" step="0.001" value="0.95" />
            </label>
            <label>
              LSL
              <input name="lsl" type="number" step="any" value="47.5" placeholder="留空" />
            </label>
            <label>
              USL
              <input name="usl" type="number" step="any" value="52.5" placeholder="留空" />
            </label>
          </div>

          <button class="primary-button" type="submit">计算</button>
        </form>

        <section class="main-stack">
          <div id="statusCard" class="status-card neutral">
            <span>等待计算</span>
            <strong>输入样本后开始验证</strong>
          </div>

          <div class="summary-grid">
            <article><span>n</span><strong id="nValue">--</strong></article>
            <article><span>X-bar</span><strong id="meanValue">--</strong></article>
            <article><span>s</span><strong id="stdValue">--</strong></article>
            <article><span>k</span><strong id="kValue">--</strong></article>
            <article class="claim"><span id="claimLabel">宣称值</span><strong id="claimValue">--</strong></article>
          </div>

          <section class="panel chart-panel">
            <div class="panel-title compact">
              <h2>容差区间与规格线</h2>
              <div class="legend">
                <span class="legend-item tolerance">LTL / UTL</span>
                <span class="legend-item spec">LSL / USL</span>
              </div>
            </div>
            <svg id="chart" viewBox="0 0 900 390" role="img" aria-label="正态分布与规格边界图"></svg>
          </section>

          <div class="bounds-grid">
            <article><span>LTL</span><strong id="ltlValue">--</strong></article>
            <article><span>UTL</span><strong id="utlValue">--</strong></article>
            <article><span>LSL</span><strong id="lslValue">--</strong></article>
            <article><span>USL</span><strong id="uslValue">--</strong></article>
          </div>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
